name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pandas pyarrow h3 numpy
      - name: Lint
        run: ruff check onprem aml/src vision
      - name: Smoke import
        run: |
          python -c "import importlib.util, pathlib; \
            [importlib.util.spec_from_file_location('m', p).loader.exec_module(importlib.util.module_from_spec(importlib.util.spec_from_file_location('m', p))) \
              for p in pathlib.Path('aml/src').rglob('*.py')]"
