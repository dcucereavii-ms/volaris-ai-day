$schema: https://azuremlschemas.azureedge.net/latest/managedOnlineDeployment.schema.json
name: blue
endpoint_name: valuation-endpoint
model: azureml:valuation_prod@latest
instance_type: Standard_DS3_v2
instance_count: 2
scale_settings:
  type: default
request_settings:
  request_timeout_ms: 5000
  max_concurrent_requests_per_instance: 4
liveness_probe:
  initial_delay: 30
  period: 30
data_collector:
  collections:
    model_inputs:
      enabled: true
    model_outputs:
      enabled: true
  rolling_rate: Hour
